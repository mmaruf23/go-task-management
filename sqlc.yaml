version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query"
    schema: "db/migration"
    gen:
      go:
        package: db
        out: "internal/db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type: 
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "text"
            nullable: true
            go_type: 
              type: "*string"